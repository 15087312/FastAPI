services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: fastapi_db
    restart: always
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    ports:
      - "${POSTGRES_PORT_LOCAL:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fastapi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: fastapi_redis
    restart: always
    env_file:
      - .env.docker
    ports:
      - "${REDIS_PORT_LOCAL:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - fastapi_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development  # 开发环境使用 development，生产环境改为 production
    container_name: fastapi_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env.docker
    environment:
      # 数据库配置（覆盖 env_file 中的默认值）
      # ⚠️ Docker 环境：必须使用 Docker 服务名 "db" 和 "redis"
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
      - POSTGRES_HOST=db              # ✅ Docker 服务名，不要修改
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mydb
      # Redis 配置
      - REDIS_HOST=redis              # ✅ Docker 服务名，不要修改
      - REDIS_PORT=6379
      - REDIS_DB=0
      # 应用配置
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: []
      # - ./app:/app/app  # 生产环境：使用镜像中的代码，不挂载
    networks:
      - fastapi_network
    command: >
      sh -c "python -c \"from alembic.config import Config; from alembic import command; alembic_cfg = Config('alembic.ini'); command.upgrade(alembic_cfg, 'head')\" &&
             python app/main.py"

  # pgAdmin (可选的数据库管理工具)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fastapi_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-123456}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - fastapi_network
    depends_on:
      - db

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  fastapi_network:
    driver: bridge
