services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: fastapi_db
    restart: always
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    ports:
      - "${POSTGRES_PORT_LOCAL:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fastapi_network
    command: >
      postgres
      -c max_connections=500
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: fastapi_redis
    restart: always
    env_file:
      - .env.docker
    ports:
      - "${REDIS_PORT_LOCAL:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxclients 10000
    networks:
      - fastapi_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka 消息队列
  kafka:
    image: apache/kafka:3.8.1
    container_name: fastapi_kafka
    restart: always
    env_file:
      - .env.docker
    ports:
      - "${KAFKA_PORT_LOCAL:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:${KAFKA_PORT_LOCAL:-9092},PLAINTEXT://kafka:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:${KAFKA_PORT_INTERNAL:-9092},CONTROLLER://0.0.0.0:9093,PLAINTEXT://0.0.0.0:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kafka-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - fastapi_network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${KAFKA_PORT_INTERNAL:-9092} || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # FastAPI 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production  # ✅ 生产环境使用 production target
    container_name: fastapi_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env.docker
    environment:
      # 数据库配置（覆盖 env_file 中的默认值）
      # ⚠️ Docker 环境：必须使用 Docker 服务名 "db" 和 "redis"
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
      - POSTGRES_HOST=db              # ✅ Docker 服务名，不要修改
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mydb
      # Redis 配置
      - REDIS_HOST=redis              # ✅ Docker 服务名，不要修改
      - REDIS_PORT=6379
      - REDIS_DB=0
      # Kafka 配置
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9094  # ✅ Docker 内部使用 PLAINTEXT listener
      - KAFKA_ENABLED=true
      # 应用配置
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes: []
      # - ./app:/app/app  # 生产环境：使用镜像中的代码，不挂载
    networks:
      - fastapi_network
    command: >
      sh -c "python -c \"from alembic.config import Config; from alembic import command; alembic_cfg = Config('alembic.ini'); command.upgrade(alembic_cfg, 'head')\" &&
             exec gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 8 --worker-connections 2000 -b 0.0.0.0:8000 --timeout 60 --keep-alive 5"

  # pgAdmin (可选的数据库管理工具)
  # 注意：pgadmin 不会随 app 自动启动，需要手动执行 docker-compose up -d pgadmin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fastapi_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-123456}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - fastapi_network
    depends_on:
      - db

  # Celery Worker (异步任务处理)
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production  # ✅ 生产环境使用 production target
    container_name: fastapi_celery_worker
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      # 数据库配置
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mydb
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      # Kafka 配置
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9094
      - KAFKA_ENABLED=true
      # 应用配置
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes: []
    networks:
      - fastapi_network
    command: >
      sh -c "celery -A celery_app worker --loglevel=info --concurrency=8 -Ofair --prefetch-multiplier=1"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  kafka_data:
    driver: local

networks:
  fastapi_network:
    driver: bridge
